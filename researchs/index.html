---
layout: page
title: Research (최근 5개년)
background: '/img/AI.jpeg'
---

{% assign sorted_papers = site.data.papers | sort: "date" | reverse %}

{% for paper in sorted_papers %}
<article class="post-preview">
  <h5 class="post-title">{{ paper.title }}</h5>
  <p class="post-meta" style="font-size: 15px;">
    {{ paper.author }}, {{ paper.journal }}
    in
    {{ paper.date | date: '%B, %Y' }}
  </p>
</article>

<hr>

{% endfor %}
