services:
  jekyll:
    build:
      context: .
      dockerfile: Dockerfile.jekyll
    container_name: ini-lab-jekyll
    working_dir: /srv/jekyll
    command: >-
      sh -c "bundle install && bundle exec jekyll serve --host 0.0.0.0 --port 4000 --livereload --force_polling"
    ports:
      - "4000:4000"
      - "35729:35729"
    environment:
      JEKYLL_ENV: development
      BUNDLE_PATH: /usr/local/bundle
      BUNDLE_APP_CONFIG: /usr/local/bundle
    volumes:
      - .:/srv/jekyll
      - bundle_cache:/usr/local/bundle

  jekyll-build:
    build:
      context: .
      dockerfile: Dockerfile.jekyll
    working_dir: /srv/jekyll
    command: >-
      sh -c "bundle install && JEKYLL_ENV=production bundle exec jekyll build"
    environment:
      BUNDLE_PATH: /usr/local/bundle
      BUNDLE_APP_CONFIG: /usr/local/bundle
    volumes:
      - .:/srv/jekyll
      - bundle_cache:/usr/local/bundle

volumes:
  bundle_cache:
